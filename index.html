<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roquebidouille Dart Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #scores { display: flex; gap: 10px; }
        button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <h1>Roquebidouille Dart Game</h1>
    <div id="player-management">
        <input type="text" id="playerName" placeholder="Enter player name" />
        <button id="addPlayer">Add Player</button>
    </div>
    <div id="scores">
        <button class="score-btn" data-score="60">60</button>
        <button class="score-btn" data-score="45">45</button>
        <button class="score-btn" data-score="20">20</button>
        <button class="score-btn" data-score="10">10</button>
        <button class="score-btn" data-score="5">5</button>
    </div>
    <div id="tournament-bracket"></div>
    <div id="history"></div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(function() { console.log('Service Worker Registered'); });
        }

        const players = [];
        let scores = {};
        let lastScore = 0;

        document.getElementById('addPlayer').onclick = function() {
            const playerName = document.getElementById('playerName').value;
            if (playerName && !players.includes(playerName)) {
                players.push(playerName);
                scores[playerName] = 301;
                updateTournamentBracket();
                document.getElementById('playerName').value = '';
                updateHistory(`Added player: ${playerName}`);
            } else {
                alert('Invalid player name or player already exists.');
            }
        };

        document.querySelectorAll('.score-btn').forEach(button => {
            button.onclick = function() {
                const score = parseInt(this.getAttribute('data-score'));
                if (players.length > 0) {
                    const currentPlayer = players[players.length - 1];
                    lastScore = scores[currentPlayer];
                    scores[currentPlayer] -= score;
                    updateHistory(`${currentPlayer} scored ${score}. Current score: ${scores[currentPlayer]}`);
                }
            };
        });

        function updateTournamentBracket() {
            const bracket = document.getElementById('tournament-bracket');
            bracket.innerHTML = 'Tournament Bracket: ' + players.join(', ');
        }

        function updateHistory(entry) {
            const historyDiv = document.getElementById('history');
            historyDiv.innerHTML += '<p>' + entry + '</p>';
        }
    </script>
</body>
</html>
